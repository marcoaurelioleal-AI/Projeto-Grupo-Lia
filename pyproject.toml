[tool.pytest.ini_options]
testpaths = ["tests", "apps/api/tests"]
addopts = "-q -p no:cacheprovider"
pythonpath = ["."]

[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "apps/web/node_modules",
  "apps/web/dist",
  "data",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
