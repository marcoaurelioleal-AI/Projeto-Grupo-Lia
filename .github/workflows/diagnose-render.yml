name: Diagnose Render services

on:
  workflow_dispatch: {}

jobs:
  diagnose-render:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: List Render services
        run: |
          test -n "$RENDER_API_KEY"
          python - <<'PY'
          import json
          import os
          import urllib.request

          api_key = os.environ["RENDER_API_KEY"]
          configured_service_id = os.environ.get("RENDER_SERVICE_ID", "")
          request = urllib.request.Request(
              "https://api.render.com/v1/services?limit=100",
              headers={"Authorization": f"Bearer {api_key}"},
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              services = json.load(response)

          print(f"Configured RENDER_SERVICE_ID: {configured_service_id}")
          for item in services:
              service = item.get("service", item)
              service_id = service.get("id")
              name = service.get("name")
              url = service.get("serviceDetails", {}).get("url") or service.get("url")
              service_type = service.get("type")
              marker = " <== configured" if service_id == configured_service_id else ""
              print(f"{service_id} | {name} | {service_type} | {url}{marker}")
          PY
