name: Build and deploy (React + API)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: render-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python files
        run: python -m compileall apps/api/app apps/api/tests tests meu_assistente.py dados_operacionais.py

      - name: Lint Python
        run: ruff check .

      - name: Validate migrations
        env:
          DATABASE_URL: sqlite:///./deploy_lia.db
        run: alembic upgrade head

      - name: Backend tests with coverage
        run: pytest --cov=apps.api.app

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Frontend lint
        working-directory: apps/web
        run: npm run lint

      - name: Frontend typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Frontend unit tests
        working-directory: apps/web
        run: npm run test

      - name: Frontend build
        working-directory: apps/web
        run: npm run build

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Frontend E2E tests
        working-directory: apps/web
        run: npm run e2e

  build-and-push:
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      packages: write
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase GHCR image tag
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy (optional)
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        run: |
          echo "Triggering Render deploy"
          curl --fail-with-body --show-error --silent --retry 3 --retry-delay 5 -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "clear"}' \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys"

      - name: Done
        run: echo "React app and FastAPI image pushed to GHCR; Render deploy triggered if configured."
